# النشر عبر FTP إلى الاستضافة
# يشترط: 1) الدفع إلى فرع main (أو master)  2) إضافة Secret اسمه FTP_PASSWORD في الإعدادات
# إذا لم تُرفع التعديلات: احذف الملف .ftp-deploy-sync-state.json من مجلد /httpdocs/ على السيرفر ثم أعد تشغيل الـ workflow
name: Deploy to  host via FTP

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # مطلوب لبعض المستودعات حتى يعمل الـ checkout ويُشغّل الـ workflow
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List files to deploy
        run: ls -la

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ftp.almoustafa.site
          username: u486977009.storeuser
          password: EbLXMiKygvw*W@2j
          protocol: ftp
          port: 21
          security: loose
          timeout: 120000
          log-level: verbose
          server-dir: /store/ 
          # اسم جديد لملف الحالة = الإكشن يتجاهل الحالة القديمة ويرفع كل التعديلات في التشغيل القادم 
          state-name: .ftp-deploy-sync-state-v2.json

          # مهم: لا يحذف ملفات السيرفر
          dangerous-clean-slate: false

          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/.env
            **/.env.*
            **/.vscode/**
            **/.idea/**
            **/README.md
            **/*.log
            **/backups/**
            **/temp/**
            **/tmp/**
            **/.DS_Store
            **/Thumbs.db
            .gitignore
            .editorconfig